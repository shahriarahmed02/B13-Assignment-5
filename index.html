<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to GitHub · Issues Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Geist', sans-serif;
    }


    .github-bg {
      background-color: #f6f8fa;
    }

    .github-card {
      background-color: #ffffff;
      border: 1px solid #d0d7de;
    }
  </style>
</head>

<body class="github-bg min-h-screen flex flex-col items-center pt-10 px-4">

  <div class="text-center mb-6">
    <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 mx-auto mb-6">
    <p class="text-sm text-[#64748B] mt-2">Sign in to manage your issues</p>
    <h1 class="text-2xl font-semibold text-[#1F2937] tracking-tight">GitHub Issues Tracker</h1>
  </div>

  <div class="github-card w-full max-w-[320px] rounded-md p-5 shadow-sm">
    <form id="login-form" class="space-y-4">
      <div class="form-control w-full">
        <label class="label py-1">
          <span class="label-text font-semibold text-sm">Username</span>
        </label>
        <input id="username" type="text" placeholder="Enter username"
          class="input input-bordered input-sm w-full focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none"
          required />
        <p class="text-[12px] font-semibold text-[#4800ffb5]">Default: admin</p>
      </div>


      <div class="form-control w-full">
        <div class="flex justify-between items-center">
          <label class="label py-1">
            <span class="label-text font-semibold text-sm">Password</span>
          </label>
        </div>
        <input id="password" type="password" placeholder="Enter password"
          class="input input-bordered input-sm w-full focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none"
          required />
        <p class="text-[12px] font-semibold text-[#4800ffb5]">Default: admin123</p>
      </div>

      <button type="submit"
        class="btn btn-sm w-full bg-[#4A00FF] hover:bg-[#4A00FF] text-white border-none normal-case font-semibold mt-2">
        Sign in
      </button>
    </form>
  </div>

  <div class="w-full max-w-[320px] mt-4 p-4 border border-[#d0d7de] rounded-md text-center bg-white">
    <p class="text-xs text-[#64748B]">
      <span class="font-bold">Demo Credentials:</span><br>
      <span class="text-[#1F2937] font-semibold">Username:</span> <span
        class="bg-gray-100 px-1 rounded text-[#64748B]">admin</span>
      <br>
      <span class="text-[#1F2937] font-semibold">Password:</span> <span
        class="bg-gray-100 px-1 rounded text-[#64748B]">admin123</span>
    </p>
  </div>

  <div id="error-toast" class="toast toast-top toast-center hidden">
    <div class="alert alert-error text-white text-sm py-2">
      <span>Invalid username or password.</span>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('login-form');
    const errorToast = document.getElementById('error-toast');

    loginForm.addEventListener('submit', function (e) {
      e.preventDefault(); // Stoping page from refresh cz html used refresh pr reload the page

      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;

      //logic to check if the username and password are correct (for demo purposes, we use hardcoded values)
      if (user === 'admin' && pass === 'admin123') {
        // Success - Redirect to main page
        window.location.href = 'dashboard.html';
      } else {
        // Fail - Show error message
        errorToast.classList.remove('hidden');
        setTimeout(() => {
          errorToast.classList.add('hidden');
        }, 3000);
      }
    });
  </script>
</body>

</html>
